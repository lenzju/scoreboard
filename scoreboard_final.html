<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard</title>
<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ════════════════════════════════════════════════
//  🔧  HIER DEINE FIREBASE-DATEN EINTRAGEN
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyDenzcU_Y75fW0es9Tx1sW7qlBJ0wJj8Fw",
  authDomain:        "scoreboard-ff703.firebaseapp.com",
  databaseURL:       "https://scoreboard-ff703-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "scoreboard-ff703",
  storageBucket:     "scoreboard-ff703.firebasestorage.app",
  messagingSenderId: "399020847978",
  appId:             "1:399020847978:web:e254f9d457916866e92b13"
};
// ════════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const dbRef = ref(db, 'scoreboard');

// ─── STATE ───────────────────────────────────────
const S = {
  score:        [0, 0],
  names:        ['TEAM 1', 'TEAM 2'],
  colors:       ['#ff4d4d', '#4d9eff'],
  timerSec:     600,
  timerRunning: false,
  countUp:      false,
};

let role      = null;
let timerInt  = null;
let lastWrite = 0;

// ─── FIREBASE SYNC ───────────────────────────────
function pushState() {
  if (role !== 'control') return;
  S.names[0] = document.getElementById('name1').value || 'TEAM 1';
  S.names[1] = document.getElementById('name2').value || 'TEAM 2';
  renderControl();
  const now = Date.now();
  lastWrite = now;
  set(dbRef, JSON.parse(JSON.stringify(S)));
}

onValue(dbRef, snap => {
  const d = snap.val();
  if (!d) return;
  // Display always applies; Control only when not own write
  if (role === 'display') {
    Object.assign(S, d);
    renderDisplay();
  } else if (role === 'control' && Date.now() - lastWrite > 500) {
    Object.assign(S, d);
    renderControl();
  }
});

// ─── PAGES ───────────────────────────────────────
window.join = function(r) {
  role = r;
  document.getElementById('home').style.display = 'none';
  if (r === 'display') {
    document.getElementById('display').classList.add('active');
    document.title = '📺 Anzeige';
  } else {
    document.getElementById('control').classList.add('active');
    document.title = '🎮 Steuerung';
    renderControl();
  }
};

// ─── RENDER DISPLAY ──────────────────────────────
function renderDisplay() {
  for (let i = 0; i < 2; i++) {
    const n = i + 1;
    el('d-name'  + n).textContent = S.names[i];
    el('d-name'  + n).style.color = S.colors[i];
    el('d-score' + n).textContent = S.score[i];
    el('d-score' + n).style.color = S.colors[i];
  }
  const te = el('d-timer');
  te.textContent = fmt(S.timerSec);
  te.className = 'd-timer';
  if (S.timerRunning)                                   te.classList.add('running');
  if (!S.countUp && S.timerSec <= 30 && S.timerSec > 0) te.classList.add('warning');
  if (!S.countUp && S.timerSec <= 0)                    te.classList.add('ended');
}

// ─── RENDER CONTROL ──────────────────────────────
function renderControl() {
  for (let i = 0; i < 2; i++) {
    const n = i + 1;
    el('name'   + n).value       = S.names[i];
    el('cscore' + n).textContent = S.score[i];
    el('cscore' + n).style.color = S.colors[i];
    el('bar'    + n).style.background = S.colors[i];
    el('col'    + n).value       = S.colors[i];
  }
  el('ctimer').textContent = fmt(S.timerSec);
  el('dir-label').textContent = S.countUp ? '↑ Hoch' : '↓ Runter';

  // Timer lokal weiterlaufen lassen falls bereits aktiv
  if (S.timerRunning && !timerInt) startLocalTimer();
}

// ─── SCORE ───────────────────────────────────────
window.chg = (i, d) => { S.score[i] = Math.max(0, S.score[i] + d); pushState(); };
window.rst = (i)    => { S.score[i] = 0; pushState(); };
window.applyCol = (i, c) => {
  S.colors[i] = c;
  el('cscore'+(i+1)).style.color = c;
  el('bar'+(i+1)).style.background = c;
  pushState();
};

// ─── TIMER ───────────────────────────────────────
function fmt(s) {
  const sign = s < 0 ? '-' : '';
  const abs  = Math.abs(Math.round(s));
  return sign + String(Math.floor(abs/60)).padStart(2,'0') + ':' + String(abs%60).padStart(2,'0');
}

function startLocalTimer() {
  if (timerInt) return;
  timerInt = setInterval(() => {
    S.timerSec += S.countUp ? 1 : -1;
    if (!S.countUp && S.timerSec <= 0) {
      S.timerSec = 0;
      clearInterval(timerInt); timerInt = null;
      S.timerRunning = false;
    }
    el('ctimer').textContent = fmt(S.timerSec);
    pushState();
  }, 1000);
}

window.setTimer = () => {
  const m = parseInt(el('set-min').value) || 0;
  const s = parseInt(el('set-sec').value) || 0;
  S.timerSec = m * 60 + s;
  el('ctimer').textContent = fmt(S.timerSec);
  pushState();
};
window.toggleDir = () => {
  S.countUp = !S.countUp;
  el('dir-label').textContent = S.countUp ? '↑ Hoch' : '↓ Runter';
  pushState();
};
window.startTimer = () => {
  S.timerRunning = true;
  startLocalTimer();
  pushState();
};
window.pauseTimer = () => {
  clearInterval(timerInt); timerInt = null;
  S.timerRunning = false;
  pushState();
};
window.stopTimer = () => {
  clearInterval(timerInt); timerInt = null;
  S.timerRunning = false;
  window.setTimer();
};

function el(id) { return document.getElementById(id); }
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }

/* HOME */
#home { display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; gap: 1.5rem; padding: 2rem; text-align: center; }
#home h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: 0.08em; }
#home p  { color: #888; max-width: 420px; line-height: 1.6; }
.card { background: #1a1a2e; border: 1.5px solid #333; border-radius: 14px;
  padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem;
  width: 100%; max-width: 360px; }
.home-btns { display: flex; gap: 0.75rem; }
.btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 700;
  font-size: 1rem; padding: 0.65rem 1.1rem; transition: opacity .15s, transform .1s; color: #fff; }
.btn:active { transform: scale(.95); opacity: .8; }
.btn-display { background: #7c3aed; flex: 1; font-size: 1rem; }
.btn-control { background: #0e7490; flex: 1; font-size: 1rem; }

/* DISPLAY */
#display { display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem; gap: 2rem; }
#display.active { display: flex; }
.d-teams { display: flex; gap: 3rem; align-items: center; width: 100%; max-width: 1400px; }
.d-team  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
.d-team-name { font-size: clamp(2rem,5vw,5rem); font-weight: 900; text-transform: uppercase;
  letter-spacing: .06em; text-align: center; word-break: break-word; }
.d-score { font-size: clamp(5rem,18vw,18rem); font-weight: 900; line-height: 1;
  text-shadow: 0 0 60px currentColor; }
.d-sep   { font-size: clamp(3rem,10vw,10rem); font-weight: 100; color: #444; }
.d-timer { font-size: clamp(2rem,6vw,6rem); font-weight: 700; font-variant-numeric: tabular-nums;
  letter-spacing: .12em; background: #111; padding: .35em .7em; border-radius: .2em;
  border: 2px solid #333; color: #fff; }
.d-timer.running { border-color: #4ade80; color: #4ade80; }
.d-timer.warning { border-color: #f97316; color: #f97316; }
.d-timer.ended   { border-color: #ef4444; color: #ef4444; }

/* CONTROL */
#control { display: none; flex-direction: column; padding: 1.2rem; gap: 1.2rem;
  max-width: 600px; margin: 0 auto; min-height: 100vh; }
#control.active { display: flex; }
.ctrl-header { text-align: center; font-size: 1.3rem; font-weight: 700; letter-spacing: .04em; }
.ctrl-teams { display: flex; gap: .9rem; }
.ctrl-team  { flex: 1; border-radius: 12px; padding: .9rem; background: #1a1a2e;
  border: 2px solid #333; display: flex; flex-direction: column; gap: .6rem; }
.color-bar  { height: 5px; border-radius: 3px; margin-bottom: .1rem; }
.name-input { background: #0d0d1a; border: 1px solid #444; border-radius: 8px; color: #fff;
  font-size: .95rem; font-weight: 700; padding: .45rem .65rem; width: 100%;
  text-transform: uppercase; letter-spacing: .05em; }
.score-big  { font-size: 3.2rem; font-weight: 900; text-align: center; line-height: 1; }
.row        { display: flex; gap: .4rem; }
.btn-plus   { background: #16a34a; font-size: 1.3rem; flex: 1; }
.btn-minus  { background: #b91c1c; font-size: 1.3rem; flex: 1; }
.btn-p2     { background: #16a34a; font-size: .9rem; flex: 1; }
.btn-p3     { background: #0d9488; font-size: .9rem; flex: 1; }
.btn-sm     { background: #374151; font-size: .8rem; padding: .5rem .6rem; }
.color-row  { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: #aaa; }
input[type="color"] { width: 34px; height: 34px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }

.timer-box  { background: #1a1a2e; border-radius: 12px; padding: .9rem 1.1rem;
  border: 2px solid #333; display: flex; flex-direction: column; gap: .7rem; }
.timer-lbl  { font-weight: 700; color: #aaa; font-size: .85rem; text-align: center; letter-spacing: .05em; }
.timer-big  { font-size: 2.8rem; font-weight: 900; text-align: center; font-variant-numeric: tabular-nums; letter-spacing: .1em; }
.timer-set  { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
.timer-set label { font-size: .82rem; color: #aaa; }
.timer-set input[type="number"] { background: #0d0d1a; border: 1px solid #444; border-radius: 8px;
  color: #fff; font-size: .95rem; padding: .35rem .5rem; width: 62px; }
.btn-set    { background: #1d4ed8; }
.btn-dir    { background: #374151; font-size: .85rem; }
.btn-start  { background: #16a34a; flex: 1; }
.btn-pause  { background: #ca8a04; flex: 1; }
.btn-stop   { background: #b91c1c; flex: 1; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <h1>⚡ SCOREBOARD</h1>
  <p>Wähle, was dieses Gerät anzeigen soll. Beide Geräte müssen dieselbe Firebase-Datenbank verwenden.</p>
  <div class="card">
    <div class="home-btns">
      <button class="btn btn-display" onclick="join('display')">📺 Anzeige<br><small style="font-weight:400;font-size:.8rem">LED-Wand</small></button>
      <button class="btn btn-control" onclick="join('control')">🎮 Steuerung<br><small style="font-weight:400;font-size:.8rem">Dein Gerät</small></button>
    </div>
  </div>
</div>

<!-- DISPLAY -->
<div id="display">
  <div class="d-teams">
    <div class="d-team">
      <div class="d-team-name" id="d-name1">TEAM 1</div>
      <div class="d-score"    id="d-score1">0</div>
    </div>
    <div class="d-sep">:</div>
    <div class="d-team">
      <div class="d-team-name" id="d-name2">TEAM 2</div>
      <div class="d-score"    id="d-score2">0</div>
    </div>
  </div>
  <div class="d-timer" id="d-timer">00:00</div>
</div>

<!-- CONTROL -->
<div id="control">
  <div class="ctrl-header">🎮 Steuerung</div>
  <div class="ctrl-teams">

    <!-- Team 1 -->
    <div class="ctrl-team">
      <div class="color-bar" id="bar1" style="background:#ff4d4d"></div>
      <input class="name-input" id="name1" value="TEAM 1" oninput="pushState()" placeholder="Teamname">
      <div class="score-big" id="cscore1" style="color:#ff4d4d">0</div>
      <div class="row">
        <button class="btn btn-plus"  onclick="chg(0,+1)">+1</button>
        <button class="btn btn-minus" onclick="chg(0,-1)">−1</button>
      </div>
      <div class="row">
        <button class="btn btn-p2" onclick="chg(0,+2)">+2</button>
        <button class="btn btn-p3" onclick="chg(0,+3)">+3</button>
        <button class="btn btn-sm" onclick="rst(0)">↺ 0</button>
      </div>
      <div class="color-row">
        Farbe: <input type="color" id="col1" value="#ff4d4d" oninput="applyCol(0,this.value)">
      </div>
    </div>

    <!-- Team 2 -->
    <div class="ctrl-team">
      <div class="color-bar" id="bar2" style="background:#4d9eff"></div>
      <input class="name-input" id="name2" value="TEAM 2" oninput="pushState()" placeholder="Teamname">
      <div class="score-big" id="cscore2" style="color:#4d9eff">0</div>
      <div class="row">
        <button class="btn btn-plus"  onclick="chg(1,+1)">+1</button>
        <button class="btn btn-minus" onclick="chg(1,-1)">−1</button>
      </div>
      <div class="row">
        <button class="btn btn-p2" onclick="chg(1,+2)">+2</button>
        <button class="btn btn-p3" onclick="chg(1,+3)">+3</button>
        <button class="btn btn-sm" onclick="rst(1)">↺ 0</button>
      </div>
      <div class="color-row">
        Farbe: <input type="color" id="col2" value="#4d9eff" oninput="applyCol(1,this.value)">
      </div>
    </div>

  </div>

  <!-- Timer -->
  <div class="timer-box">
    <div class="timer-lbl">⏱ TIMER</div>
    <div class="timer-big" id="ctimer">10:00</div>
    <div class="timer-set">
      <label>Min:</label>
      <input type="number" id="set-min" value="10" min="0" max="99">
      <label>Sek:</label>
      <input type="number" id="set-sec" value="0"  min="0" max="59">
      <button class="btn btn-set" onclick="setTimer()">⏎ Setzen</button>
      <button class="btn btn-dir" onclick="toggleDir()">⇅ <span id="dir-label">↓ Runter</span></button>
    </div>
    <div class="row">
      <button class="btn btn-start" onclick="startTimer()">▶ Start</button>
      <button class="btn btn-pause" onclick="pauseTimer()">⏸ Pause</button>
      <button class="btn btn-stop"  onclick="stopTimer()">⏹ Reset</button>
    </div>
  </div>
</div>

</body>
</html>
